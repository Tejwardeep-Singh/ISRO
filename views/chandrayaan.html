<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISRO Rocket Animation</title>

  <style>
    body, html {
      margin: 0;
      height: 200vh; /* Making page scrollable */
      background: black;
      overflow-x: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div id="canvas-container"></div>

  <!-- THREE.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';
  
  let scene, camera, renderer, mixer, model, clock, stars;

  init();
  animate();

  function init() {
    scene = new THREE.Scene();
    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    // ⭐ STAR FIELD
    addStarField();

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 10, 7);
    scene.add(light);

    // Load Blender GLB
    const loader = new GLTFLoader();
    loader.load(
      "/public/models/earth3.glb", 
      function (gltf) {
        console.log('Model loaded successfully!');
        model = gltf.scene;
        scene.add(model);

        // Check if animations exist before using mixer
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          mixer.clipAction(gltf.animations[0]).play();
        }
      },
      // Progress callback
      function (xhr) {
        console.log((xhr.loaded / xhr.total * 100) + '% loaded');
      },
      // Error callback
      function (error) {
        console.error('Error loading model:', error);
        alert('Failed to load 3D model. Please check the console for details.');
      }
    );

    window.addEventListener("resize", onWindowResize);
    window.addEventListener("scroll", onScrollAnimation);
  }

  // ⭐ Stars creation function
  function addStarField() {
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 5000;
    const positions = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 300;  // Big star cube
    }

    starGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const starMaterial = new THREE.PointsMaterial({
      size: 0.7,
      transparent: true
    });

    stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);
  }

  function onScrollAnimation() {
    if (mixer) {
      let scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      let animationLength = mixer._actions[0]._clip.duration;
      mixer.setTime(scrollPercent * animationLength);
    }
  }

  function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function animate() {
    requestAnimationFrame(animate);

    // Update animation mixer
    if (mixer) {
      mixer.update(clock.getDelta());
    }

    // ⭐ Rotate stars slowly for deep-space effect
    if (stars) {
      stars.rotation.y += 0.0005;
      stars.rotation.x += 0.0002;
    }

    renderer.render(scene, camera);
  }
  </script>


</body>
</html>
